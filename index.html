<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymLog">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GymLog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --accent-dim2: rgba(232,255,71,0.06);
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #999;
    --red: #ff4757;
    --green: #2ed573;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── APP SHELL ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .header-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ── NAV TABS ── */
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: calc(var(--safe-top) + 57px);
    z-index: 99;
  }

  nav button {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN CONTENT ── */
  main { flex: 1; }

  .view { display: none; }
  .view.active { display: block; }

  /* ── WORKOUT VIEW ── */
  .workout-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .workout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .progress-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .progress-pill span {
    color: var(--accent);
    font-weight: 500;
  }

  /* ── EXERCISE CARD ── */
  .exercise-list {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .exercise-card.all-done {
    border-color: rgba(46,213,115,0.3);
    background: rgba(46,213,115,0.04);
  }

  .exercise-card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .ex-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text-muted);
    min-width: 24px;
    line-height: 1;
  }

  .ex-info { flex: 1; }

  .ex-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .ex-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .ex-done-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(46,213,115,0.15);
    color: var(--green);
    display: none;
  }

  .exercise-card.all-done .ex-done-badge { display: block; }
  .exercise-card.all-done .ex-num { color: var(--green); }

  .ex-toggle {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }

  .exercise-card.collapsed .ex-toggle { transform: rotate(-90deg); }

  /* ── SET ROWS ── */
  .sets-container {
    padding: 0 16px 14px;
  }

  .exercise-card.collapsed .sets-container { display: none; }

  .sets-header {
    display: grid;
    grid-template-columns: 28px 1fr 72px 72px 36px 28px;
    gap: 6px;
    padding: 0 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .sets-header span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .sets-header span:nth-child(2) { text-align: left; }

  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 72px 72px 36px 28px;
    gap: 6px;
    align-items: center;
    padding: 5px 4px;
    border-radius: 6px;
    transition: background 0.25s ease;
    animation: slideIn 0.25s ease;
  }

  .set-row.done-row {
    background: rgba(46,213,115,0.08);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .set-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }

  .set-name {
    font-size: 13px;
    color: var(--text-dim);
  }

  .set-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .set-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: center;
    padding: 6px 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .set-input:focus {
    border-color: var(--accent);
    background: var(--accent-dim2);
  }

  .set-check {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .set-check:active {
    transform: scale(0.88);
  }

  .set-check svg {
    width: 14px;
    height: 14px;
    stroke: transparent;
    transition: stroke 0.2s;
  }

  .set-check.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .set-check.checked svg {
    stroke: #0a0a0a;
  }

  .set-row.done-row .set-input {
    border-color: rgba(46,213,115,0.3);
    color: var(--green);
    background: rgba(46,213,115,0.05);
  }

  .set-row.done-row .set-label,
  .set-row.done-row .set-name {
    color: var(--green);
    opacity: 0.8;
  }

  .del-btn {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .del-btn:active {
    background: rgba(255,71,87,0.15);
    border-color: var(--red);
    color: var(--red);
  }

  /* ── ADD SET BUTTON ── */
  .add-set-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 12px;
    cursor: pointer;
    margin-top: 8px;
    width: 100%;
    transition: all 0.2s;
  }

  .add-set-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── FINISH BUTTON ── */
  .finish-section {
    padding: 16px 20px;
    padding-bottom: calc(var(--safe-bottom) + 20px);
  }

  .finish-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: #0a0a0a;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .finish-btn:active { transform: scale(0.97); }

  .finish-btn:disabled {
    background: var(--surface2);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  /* ── HISTORY VIEW ── */
  .history-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
  }

  .history-empty .big-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .history-empty p {
    font-size: 14px;
    line-height: 1.6;
  }

  .history-list {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
  }

  .history-card-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .history-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .history-stats {
    display: flex;
    gap: 8px;
  }

  .stat-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 20px;
    background: var(--accent-dim2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .stat-chip.accent {
    background: var(--accent-dim);
    color: var(--accent);
    border-color: rgba(232,255,71,0.3);
  }

  /* ── HISTORY DETAIL ── */
  .history-detail-body {
    border-top: 1px solid var(--border);
    display: none;
  }

  .history-card.expanded .history-detail-body {
    display: block;
  }

  .history-ex-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-ex-row:last-child { border-bottom: none; }

  .history-ex-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .history-ex-sets {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .history-ex-volume {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-align: right;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 24px);
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
  }

  #toast .toast-icon {
    margin-right: 8px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 24px 20px;
    padding-bottom: calc(var(--safe-bottom) + 24px);
    width: 100%;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  .modal-btns button {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btns .cancel {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .modal-btns .confirm {
    background: var(--accent);
    color: #0a0a0a;
    font-weight: 600;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 0; }

  /* ── SUPERSET BADGE ── */
  .superset-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(232,255,71,0.12);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.2);
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .view-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    padding: 16px 20px 0;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">GymLog</div>
    <div class="header-date" id="headerDate"></div>
  </header>

  <nav>
    <button class="active" onclick="showView('workout')">Antrenman</button>
    <button onclick="showView('history')">Geçmiş</button>
  </nav>

  <main>
    <!-- WORKOUT VIEW -->
    <div id="view-workout" class="view active">
      <div class="workout-header">
        <div class="workout-title">Bugünün Antrenmanı</div>
        <div class="progress-pill"><span id="doneCount">0</span> / <span id="totalCount">0</span> set</div>
      </div>

      <div class="exercise-list" id="exerciseList"></div>

      <div class="finish-section">
        <button class="finish-btn" id="finishBtn" onclick="openFinishModal()">
          ✓ ANTRENMANΙ BITIR
        </button>
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div id="view-history" class="view">
      <div id="historyContent"></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- Finish Modal -->
<div class="modal-overlay" id="finishModal" onclick="closeFinishModal(event)">
  <div class="modal">
    <h3>Antrenmanı Bitir 💪</h3>
    <p>Tamamlanan setler kaydedilecek ve arşive eklenecek. Devam ediyor musun?</p>
    <div class="modal-btns">
      <button class="cancel" onclick="closeFinishModal()">İptal</button>
      <button class="confirm" onclick="finishWorkout()">Kaydet</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA: Default workout program (full-body machine superset)
// ─────────────────────────────────────────────
const DEFAULT_PROGRAM = [
  {
    name: "Leg Press",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
    ]
  },
  {
    name: "Vertical Row",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
    ]
  },
  {
    name: "Leg Curl",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
    ]
  },
  {
    name: "Lat Pulldown",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
    ]
  },
  {
    name: "Leg Extension",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
      { reps: 12, kg: 59 },
    ]
  },
  {
    name: "Rear Delt Fly",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 25 },
      { reps: 12, kg: 25 },
      { reps: 12, kg: 25 },
      { reps: 12, kg: 25 },
    ]
  },
  {
    name: "Shoulder Press",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
    ]
  },
  {
    name: "Pec Deck",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
    ]
  },
  {
    name: "Chest Press",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
      { reps: 12, kg: 39 },
    ]
  },
  {
    name: "Row Machine",
    superset: null,
    defaultSets: [
      { reps: 12, kg: 35 },
      { reps: 12, kg: 35 },
      { reps: 12, kg: 35 },
      { reps: 12, kg: 35 },
    ]
  },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let workoutState = []; // live session
let history = [];      // saved sessions
let workoutStartTime = null; // set on first completed set

function loadState() {
  try {
    const saved = localStorage.getItem('gymlog_session');
    if (saved) workoutState = JSON.parse(saved);
    else initWorkout();

    const savedHistory = localStorage.getItem('gymlog_history');
    if (savedHistory) history = JSON.parse(savedHistory);

    const savedStart = localStorage.getItem('gymlog_start');
    if (savedStart) workoutStartTime = savedStart;
  } catch(e) {
    initWorkout();
  }
}

function saveSession() {
  localStorage.setItem('gymlog_session', JSON.stringify(workoutState));
}

function saveHistory() {
  localStorage.setItem('gymlog_history', JSON.stringify(history));
}

function initWorkout() {
  workoutState = DEFAULT_PROGRAM.map((ex, exIdx) => ({
    id: exIdx,
    name: ex.name,
    superset: ex.superset,
    collapsed: false,
    sets: ex.defaultSets.map((s, i) => ({
      id: i,
      reps: s.reps,
      kg: s.kg,
      done: false,
    }))
  }));
  saveSession();
}

// ─────────────────────────────────────────────
// RENDER WORKOUT
// ─────────────────────────────────────────────
function renderWorkout() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';

  let totalSets = 0, doneSets = 0;

  workoutState.forEach((ex, exIdx) => {
    const doneSetsCount = ex.sets.filter(s => s.done).length;
    totalSets += ex.sets.length;
    doneSets  += ex.sets.filter(s => s.done).length;

    const allDone = doneSetsCount === ex.sets.length && ex.sets.length > 0;

    const card = document.createElement('div');
    card.className = `exercise-card${allDone ? ' all-done' : ''}${ex.collapsed ? ' collapsed' : ''}`;
    card.id = `ex-card-${exIdx}`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'exercise-card-header';
    hdr.onclick = () => toggleCollapse(exIdx);
    hdr.innerHTML = `
      <div class="ex-num">${String(exIdx+1).padStart(2,'0')}</div>
      <div class="ex-info">
        <div class="ex-name">
          ${ex.name}
          ${ex.superset ? `<span class="superset-badge">SS-${ex.superset}</span>` : ''}
        </div>
        <div class="ex-meta">${ex.sets.length} set · ${doneSetsCount}/${ex.sets.length} tamamlandı</div>
      </div>
      <div class="ex-done-badge">✓ Bitti</div>
      <div class="ex-toggle">▾</div>
    `;
    card.appendChild(hdr);

    // Sets container
    const setsWrap = document.createElement('div');
    setsWrap.className = 'sets-container';

    if (ex.sets.length > 0) {
      const setsHdr = document.createElement('div');
      setsHdr.className = 'sets-header';
      setsHdr.innerHTML = `<span>#</span><span>Set</span><span>Tekrar</span><span>KG</span><span>✓</span><span></span>`;
      setsWrap.appendChild(setsHdr);
    }

    // Done setler üstte, bekleyenler altta
    const sortedSets = [
      ...ex.sets.map((s, i) => ({ ...s, origIdx: i })).filter(s => s.done),
      ...ex.sets.map((s, i) => ({ ...s, origIdx: i })).filter(s => !s.done),
    ];

    sortedSets.forEach((set) => {
      const setIdx = set.origIdx;
      const row = document.createElement('div');
      row.className = `set-row${set.done ? ' done-row' : ''}`;
      row.id = `set-row-${exIdx}-${setIdx}`;

      row.innerHTML = `
        <div class="set-label">${setIdx+1}</div>
        <div class="set-name">Set ${setIdx+1}</div>
        <div class="set-input-wrap">
          <input class="set-input" type="number" inputmode="decimal" value="${set.reps}"
            onchange="updateSet(${exIdx},${setIdx},'reps',this.value)">
        </div>
        <div class="set-input-wrap">
          <input class="set-input" type="number" inputmode="decimal" value="${set.kg}"
            onchange="updateSet(${exIdx},${setIdx},'kg',this.value)">
        </div>
        <button class="set-check${set.done ? ' checked' : ''}" onclick="toggleSet(${exIdx},${setIdx})" aria-label="Seti tamamla">
          <svg viewBox="0 0 14 14" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,7 5.5,10.5 12,3"/>
          </svg>
        </button>
        <button class="del-btn" onclick="deleteSet(${exIdx},${setIdx})" aria-label="Seti sil">×</button>
      `;
      setsWrap.appendChild(row);
    });

    // Add set button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-set-btn';
    addBtn.innerHTML = `<span>+</span> Set ekle`;
    addBtn.onclick = (e) => { e.stopPropagation(); addSet(exIdx); };
    setsWrap.appendChild(addBtn);

    card.appendChild(setsWrap);
    list.appendChild(card);
  });

  document.getElementById('doneCount').textContent = doneSets;
  document.getElementById('totalCount').textContent = totalSets;

  const pct = totalSets > 0 ? doneSets / totalSets : 0;
  const finishBtn = document.getElementById('finishBtn');
  finishBtn.disabled = doneSets === 0;
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────
function toggleCollapse(exIdx) {
  workoutState[exIdx].collapsed = !workoutState[exIdx].collapsed;
  saveSession();
  renderWorkout();
}

function updateSet(exIdx, setIdx, field, value) {
  workoutState[exIdx].sets[setIdx][field] = parseFloat(value) || 0;
  saveSession();
  updateProgress();
}

function toggleSet(exIdx, setIdx) {
  const isFirstEver = !workoutStartTime && !workoutState.some(ex => ex.sets.some(s => s.done));
  workoutState[exIdx].sets[setIdx].done = !workoutState[exIdx].sets[setIdx].done;

  if (isFirstEver && workoutState[exIdx].sets[setIdx].done) {
    workoutStartTime = new Date().toISOString();
    localStorage.setItem('gymlog_start', workoutStartTime);
  }

  saveSession();
  renderWorkout();
  updateProgress();

  const allDone = workoutState[exIdx].sets.every(s => s.done);
  if (allDone) showToast(`💪 ${workoutState[exIdx].name} tamamlandı!`);
}

function deleteSet(exIdx, setIdx) {
  workoutState[exIdx].sets.splice(setIdx, 1);
  saveSession();
  renderWorkout();
  updateProgress();
}

function addSet(exIdx) {
  const ex = workoutState[exIdx];
  const lastSet = ex.sets[ex.sets.length - 1];
  ex.sets.push({
    id: ex.sets.length,
    reps: lastSet ? lastSet.reps : 10,
    kg: lastSet ? lastSet.kg : 0,
    done: false,
  });
  saveSession();
  renderWorkout();
}

function updateProgress() {
  const total = workoutState.reduce((a,ex) => a + ex.sets.length, 0);
  const done  = workoutState.reduce((a,ex) => a + ex.sets.filter(s=>s.done).length, 0);
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('finishBtn').disabled = done === 0;
}

// ─────────────────────────────────────────────
// FINISH WORKOUT
// ─────────────────────────────────────────────
function openFinishModal() {
  document.getElementById('finishModal').classList.add('show');
}

function closeFinishModal(e) {
  if (!e || e.target === document.getElementById('finishModal')) {
    document.getElementById('finishModal').classList.remove('show');
  }
}

function finishWorkout() {
  closeFinishModal();

  const now = new Date();
  const startLabel = workoutStartTime ? formatTime(new Date(workoutStartTime)) : null;

  const session = {
    id: Date.now(),
    timestamp: now.toISOString(),
    dateLabel: formatDate(now),
    timeLabel: formatTime(now),
    startLabel: startLabel,
    exercises: workoutState
      .filter(ex => ex.sets.some(s => s.done))
      .map(ex => ({
        name: ex.name,
        superset: ex.superset,
        sets: ex.sets.filter(s => s.done).map(s => ({ reps: s.reps, kg: s.kg })),
      }))
  };

  history.unshift(session);
  saveHistory();

  // Reset
  workoutStartTime = null;
  localStorage.removeItem('gymlog_start');
  initWorkout();
  renderWorkout();

  showToast('🎉 Antrenman kaydedildi!');
  setTimeout(() => showView('history'), 800);
}

// ─────────────────────────────────────────────
// HISTORY
// ─────────────────────────────────────────────
function renderHistory() {
  const cont = document.getElementById('historyContent');

  if (history.length === 0) {
    cont.innerHTML = `
      <div class="history-empty">
        <div class="big-icon">📋</div>
        <p>Henüz kayıtlı antrenman yok.<br>İlk antrenmانını tamamla!</p>
      </div>`;
    return;
  }

  cont.innerHTML = `<div class="view-section-title">ARŞİV — ${history.length} ANTRENMAN</div><div class="history-list" id="historyList"></div>`;
  const list = document.getElementById('historyList');

  history.forEach((session, sIdx) => {
    const totalSets = session.exercises.reduce((a, ex) => a + ex.sets.length, 0);
    const totalVol  = session.exercises.reduce((a, ex) =>
      a + ex.sets.reduce((b, s) => b + (s.reps * s.kg), 0), 0);

    const card = document.createElement('div');
    card.className = 'history-card';
    card.id = `hist-${sIdx}`;

    card.innerHTML = `
      <div class="history-card-header" onclick="toggleHistoryCard(${sIdx})">
        <div>
          <div class="history-date">${session.dateLabel}</div>
          <div class="history-time">${session.startLabel ? session.startLabel + ' → ' : ''}${session.timeLabel} · ${session.exercises.length} egzersiz</div>
        </div>
        <div class="history-stats">
          <div class="stat-chip">${totalSets} set</div>
          <div class="stat-chip accent">${Math.round(totalVol)} kg</div>
        </div>
      </div>
      <div class="history-detail-body">
        ${session.exercises.map(ex => {
          const vol = ex.sets.reduce((a,s) => a + s.reps*s.kg, 0);
          const setsStr = ex.sets.map(s => `${s.reps}×${s.kg}kg`).join(' / ');
          return `
            <div class="history-ex-row">
              <div>
                <div class="history-ex-name">${ex.name}${ex.superset ? `<span class="superset-badge">SS-${ex.superset}</span>` : ''}</div>
                <div class="history-ex-sets">${setsStr}</div>
              </div>
              <div class="history-ex-volume">${Math.round(vol)} kg</div>
            </div>`;
        }).join('')}
      </div>
    `;

    list.appendChild(card);
  });
}

function toggleHistoryCard(idx) {
  const card = document.getElementById(`hist-${idx}`);
  card.classList.toggle('expanded');
}

// ─────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

  document.getElementById(`view-${name}`).classList.add('active');
  document.querySelectorAll('nav button')[name === 'workout' ? 0 : 1].classList.add('active');

  if (name === 'history') renderHistory();
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function formatDate(d) {
  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatTime(d) {
  return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
}

function updateHeaderDate() {
  const now = new Date();
  document.getElementById('headerDate').innerHTML =
    `${formatDate(now)}<br>${formatTime(now)}`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadState();
renderWorkout();
updateHeaderDate();
setInterval(updateHeaderDate, 30000);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
